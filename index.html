  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Nunito:wght@600;800&display=swap');
    body {
      font-family: 'Nunito', 'Kosugi Maru', sans-serif;
      background-color: #f0fdf4;
      -webkit-tap-highlight-color: transparent;
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceIn {
      0% { transform: scale(0.1); opacity: 0; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-bounce-in {
      animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    /* スクロールバー非表示 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

    const DISHES = [
      "タケノコとサツマイモの ホクホクおみそしる", "サツマイモの タケノコあんかけ", "秋の あまから きんぴら",

    ];

    // --- ヘルパー関数 ---
    const speak = (text) => {
      const synth = window.speechSynthesis;
      if (synth.speaking) synth.cancel();
      const utterThis = new SpeechSynthesisUtterance(text);
      utterThis.lang = 'en-US';
      synth.speak(utterThis);
    };

    const getArticle = (word) => {
      if (!word) return 'a';
      const vowels = ['a', 'e', 'i', 'o', 'u'];
      return vowels.includes(word.charAt(0).toLowerCase()) ? 'an' : 'a';
    };

    const translateText = async (text) => {
      try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=en&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        return data[0][0][0].toLowerCase().replace(/[.,!]/g, '');
      } catch (e) {
        alert("翻訳に失敗しました。一時的に英語を入力してください。");
        return text;
      }
    };

    const shuffleString = (str) => {
      let arr = str.split('');
      if (arr.length <= 1) return arr;
      let shuffled;
      do {
        shuffled = [...arr].sort(() => Math.random() - 0.5);
      } while (shuffled.join('') === str && arr.length > 2);
      return shuffled;
    };

    // --- ミニゲームコンポーネント ---
    function MiniGame({ monsters, onFinish }) {
      const [timeLeft, setTimeLeft] = useState(15);
      const [coins, setCoins] = useState(0);
      
      const initialPositions = useMemo(() => {
        return monsters.length > 0 ? monsters.map((m) => ({
          id: m.id, emoji: m.emoji, x: 50 + (Math.random() * 40 - 20), y: 50 + (Math.random() * 40 - 20)
        })) : [{ id: 0, emoji: "🧑", x: 50, y: 50 }]; // モンスターがいない場合のデフォルト
      }, [monsters]);

      const [playerPositions, setPlayerPositions] = useState(initialPositions);
      const [coinPos, setCoinPos] = useState({x: Math.random() * 80 + 10, y: Math.random() * 80 + 10});
      
      const playersRef = useRef(initialPositions);
      const coinRef = useRef({x: coinPos.x, y: coinPos.y});
      const keysRef = useRef({ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false});
      const requestRef = useRef();
      const isFinished = useRef(false);

      useEffect(() => {
        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timer);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (timeLeft === 0 && !isFinished.current) {
          isFinished.current = true;
          cancelAnimationFrame(requestRef.current);
          onFinish(coins);
        }
      }, [timeLeft, coins, onFinish]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (keysRef.current.hasOwnProperty(e.key)) { keysRef.current[e.key] = true; e.preventDefault(); }
        };
        const handleKeyUp = (e) => {
          if (keysRef.current.hasOwnProperty(e.key)) { keysRef.current[e.key] = false; e.preventDefault(); }
        };
        window.addEventListener('keydown', handleKeyDown, {passive: false});
        window.addEventListener('keyup', handleKeyUp);
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('keyup', handleKeyUp);
        };
      }, []);

      useEffect(() => {
        const updateGame = () => {
          if (timeLeft <= 0) return;
          const speed = 1.5;
          let dx = 0; let dy = 0;
          if (keysRef.current.ArrowUp) dy -= speed;
          if (keysRef.current.ArrowDown) dy += speed;
          if (keysRef.current.ArrowLeft) dx -= speed;
          if (keysRef.current.ArrowRight) dx += speed;

          const newPositions = playersRef.current.map(p => {
            let px = p.x + dx; let py = p.y + dy;
            px = Math.max(5, Math.min(95, px)); py = Math.max(5, Math.min(95, py));
            return { ...p, x: px, y: py };
          });

          playersRef.current = newPositions;
          setPlayerPositions(newPositions);

          const cx = coinRef.current.x; const cy = coinRef.current.y;
          const hit = newPositions.some(p => Math.hypot(p.x - cx, p.y - cy) < 12);
          
          if (hit) { 
            setCoins(c => c + 1);
            coinRef.current = { x: Math.random() * 80 + 10, y: Math.random() * 80 + 10 };
            setCoinPos({...coinRef.current});
          }
          requestRef.current = requestAnimationFrame(updateGame);
        };
        requestRef.current = requestAnimationFrame(updateGame);
        return () => cancelAnimationFrame(requestRef.current);
      }, [timeLeft]);

      const handlePointer = (dir, isDown) => { keysRef.current[dir] = isDown; };

      return (
        <div className="min-h-screen bg-green-50 p-4 pt-20 flex flex-col items-center justify-center relative">
          <div className="w-full bg-white rounded-3xl shadow-xl p-4 md:p-8 border-4 border-green-200">
            <h2 className="text-2xl font-bold text-center text-green-700 mb-4">コインをあつめよう！</h2>
            <div className="flex justify-between items-center mb-4 px-2">
              <div className="text-2xl font-bold text-gray-700">⏳ {timeLeft}びょう</div>
              <div className="text-2xl font-bold text-yellow-500">🪙 {coins} コイン</div>
            </div>
            
            <div className="relative w-full h-80 bg-green-100 rounded-xl overflow-hidden border-2 border-green-300">
              {playerPositions.map((p, index) => (
                <div key={p.id + '-' + index} className="absolute text-5xl transform -translate-x-1/2 -translate-y-1/2 drop-shadow-md z-10" style={{ left: `${p.x}%`, top: `${p.y}%` }}>
                  {p.emoji}
                </div>
              ))}
              <div className="absolute text-4xl transform -translate-x-1/2 -translate-y-1/2 drop-shadow-md animate-bounce" style={{ left: `${coinPos.x}%`, top: `${coinPos.y}%` }}>🪙</div>
            </div>

            <div className="grid grid-cols-3 gap-2 w-48 mx-auto mt-6 touch-none">
              <div />
              <button className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center" onPointerDown={() => handlePointer('ArrowUp', true)} onPointerUp={() => handlePointer('ArrowUp', false)} onPointerLeave={() => handlePointer('ArrowUp', false)}>⬆️</button>
              <div />
              <button className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center" onPointerDown={() => handlePointer('ArrowLeft', true)} onPointerUp={() => handlePointer('ArrowLeft', false)} onPointerLeave={() => handlePointer('ArrowLeft', false)}>⬅️</button>
              <button className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center" onPointerDown={() => handlePointer('ArrowDown', true)} onPointerUp={() => handlePointer('ArrowDown', false)} onPointerLeave={() => handlePointer('ArrowDown', false)}>⬇️</button>
              <button className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center" onPointerDown={() => handlePointer('ArrowRight', true)} onPointerUp={() => handlePointer('ArrowRight', false)} onPointerLeave={() => handlePointer('ArrowRight', false)}>➡️</button>
            </div>
            <p className="text-center text-gray-500 mt-4 text-sm font-bold">じゅうじキーでも うごかせるよ</p>
          </div>
        </div>
      );
    }

    // --- メインコンポーネント ---
    function App() {
      // 進行状態の管理
      const [step, setStep] = useState('START'); // START, STEP1_JOB, STEP1_STUDY, CHECK_STEP1, STEP2_ORIGINAL, STEP2_TIMETABLE, CHECK_STEP2, SPEAKING, QUIZ_INTRO, QUIZ, REWARD_HOME, MINIGAME_INTRO, MINIGAME, MINIGAME_RESULT, GACHA, FINISH

      // データ保存用State
      const [jobJa, setJobJa] = useState('');
      const [jobEn, setJobEn] = useState('');
      const [isTranslatingJob, setIsTranslatingJob] = useState(false);

      const [origSubjJa, setOrigSubjJa] = useState('');
      const [origSubjEn, setOrigSubjEn] = useState('');
      const [isTranslatingSubj, setIsTranslatingSubj] = useState(false);

      const [timetable, setTimetable] = useState(Array(6).fill(null)); // 0-5
      const [editingSlot, setEditingSlot] = useState(null); // モーダル開閉用
      const [timetableError, setTimetableError] = useState('');

      const [isListening, setIsListening] = useState(false);
      const [speakFeedback, setSpeakFeedback] = useState('');
      const [failCount, setFailCount] = useState(0);

      const [quizIndex, setQuizIndex] = useState(0);
      const [quizInput, setQuizInput] = useState('');
      const [quizLetters, setQuizLetters] = useState([]);
      const [quizFeedback, setQuizFeedback] = useState(null); // null, 'correct', 'wrong'
      const [quizPhase, setQuizPhase] = useState('INPUT'); // 'INPUT', 'SPEAKING'
      const [quizSpeakFeedback, setQuizSpeakFeedback] = useState('');

      // ワークシート・ゲーム関連のState
      const [showWorksheet, setShowWorksheet] = useState(false);
      const [rewardTickets, setRewardTickets] = useState(0); // ガチャ・ゲーム用のチケット
      const [totalCoins, setTotalCoins] = useState(0);
      const [items, setItems] = useState({ takenoko: 0, satsumaimo: 0 });
      const [collections, setCollections] = useState([]);
      const [cookedDishes, setCookedDishes] = useState([]);
      const [purchaseEffect, setPurchaseEffect] = useState(null);
      const [cookEffect, setCookEffect] = useState(null);
      const [currentGachaMonster, setCurrentGachaMonster] = useState(null);
      const [isRolling, setIsRolling] = useState(false);
      const [rollEmoji, setRollEmoji] = useState("🎁");
      const [lastEarnedCoins, setLastEarnedCoins] = useState(0);

      // LocalStorageからデータを読み込む
      useEffect(() => {
        const savedCoins = localStorage.getItem('wkAppCoins');
        if (savedCoins) setTotalCoins(parseInt(savedCoins, 10));
        const savedItems = localStorage.getItem('wkAppItems');
        if (savedItems) setItems(JSON.parse(savedItems));
        const savedCol = localStorage.getItem('wkAppCollections');
        if (savedCol) setCollections(JSON.parse(savedCol));
        const savedDishes = localStorage.getItem('wkAppDishes');
        if (savedDishes) setCookedDishes(JSON.parse(savedDishes));
        const savedTickets = localStorage.getItem('wkAppTickets');
        if (savedTickets) setRewardTickets(parseInt(savedTickets, 10));
      }, []);

      const saveGameData = (coins, newItems, cols, dishes, tickets) => {
        localStorage.setItem('wkAppCoins', coins.toString());
        localStorage.setItem('wkAppItems', JSON.stringify(newItems));
        localStorage.setItem('wkAppCollections', JSON.stringify(cols));
        localStorage.setItem('wkAppDishes', JSON.stringify(dishes));
        localStorage.setItem('wkAppTickets', tickets.toString());
        setTotalCoins(coins);
        setItems(newItems);
        setCollections(cols);
        setCookedDishes(dishes);
        setRewardTickets(tickets);
      };

      // --- ステップごとのアクション ---
      const handleBack = () => {
        switch (step) {
          case 'STEP1_JOB': setStep('START'); break;
          case 'STEP1_STUDY': setStep('STEP1_JOB'); break;
          case 'CHECK_STEP1': setStep('STEP1_STUDY'); break;
          case 'STEP2_ORIGINAL': setStep('CHECK_STEP1'); break;
          case 'STEP2_TIMETABLE': setStep('STEP2_ORIGINAL'); break;
          case 'CHECK_STEP2': setStep('STEP2_TIMETABLE'); break;
          case 'SPEAKING': setStep('CHECK_STEP2'); break;
          case 'QUIZ_INTRO': setStep('SPEAKING'); break;
          case 'QUIZ': setStep('QUIZ_INTRO'); break;
          case 'REWARD_HOME': setStep('QUIZ'); break; // ご褒美からクイズに戻る
          default: break;
        }
        setTimetableError('');
        setIsListening(false);
        setSpeakFeedback('');
        setQuizSpeakFeedback('');
        setFailCount(0);
      };

      const handleTranslateJob = async () => {
        if (!jobJa.trim()) return alert("日本語を入力してね！");
        setIsTranslatingJob(true);
        const en = await translateText(jobJa.trim());
        setJobEn(en);
        setIsTranslatingJob(false);
        speak(en);
      };

      const handleTranslateOrigSubj = async () => {
        if (!origSubjJa.trim()) return alert("日本語を入力してね！");
        setIsTranslatingSubj(true);
        const enText = await translateText(origSubjJa.trim());
        const finalEn = enText.toLowerCase().includes('class') ? enText : `${enText} class`;
        setOrigSubjEn(finalEn);
        setIsTranslatingSubj(false);
        speak(finalEn);
      };

      const validateTimetable = () => {
        if (timetable.includes(null)) return "1〜6時間目まですべてうめてね！";
        let hasOriginal = false;
        const counts = {};
        for (const subj of timetable) {
          if (subj.en === origSubjEn) hasOriginal = true;
          counts[subj.en] = (counts[subj.en] || 0) + 1;
        }
        if (!hasOriginal) return "オリジナルの教科が1つも入っていないよ！";
        let twoTimesCount = 0;
        for (const key in counts) {
          if (counts[key] > 2) return `「${counts[key]}」回入っている教科があるよ！2回できる教科は1つまでだよ。`;
          if (counts[key] === 2) twoTimesCount++;
        }
        if (twoTimesCount > 1) return "2回入っている教科が複数あるよ！2回できる教科は1つだけにしてね。";
        return null;
      };

      const handleTimetableSubmit = () => {
        const error = validateTimetable();
        if (error) {
          setTimetableError(error);
          return;
        }
        setTimetableError('');
        setStep('CHECK_STEP2');
      };

      // 時間割の教科から発音用の文字列を生成
      const getSpeakingTextData = () => {
        const uniqueSubjsForSpeak = Array.from(new Set(timetable.filter(s=>s).map(s => JSON.stringify(s)))).map(s => JSON.parse(s));
        const subjEnList = uniqueSubjsForSpeak.map(s => s.en);

        if (subjEnList.length === 1) {
            subjEnStr = subjEnList[0];
            subjJaStr = subjJaList[0];
        } else if (subjEnList.length === 2) {
            subjEnStr = `${subjEnList[0]} and ${subjEnList[1]}`;
            subjJaStr = `${subjJaList[0]}と${subjJaList[1]}`;
        } else {
            subjEnStr = subjEnList.slice(0, -1).join(", ") + ", and " + subjEnList[subjEnList.length - 1];
            subjJaStr = subjJaList.join("、");
        }
        const article = getArticle(jobEn);
        const enSentence = `I have ${subjEnStr} on Fridays. I want to be ${article} ${jobEn}.`;
        return { enSentence, subjJaStr, targetSubjs: subjEnList.map(s => s.toLowerCase().replace(' class', '')) };
      };

      const startListening = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert("お使いのブラウザは音声入力に対応していません。スキップしてください。");
          setFailCount(3);
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        setIsListening(true);
        setSpeakFeedback('');

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.toLowerCase();
          const { targetSubjs } = getSpeakingTextData();
          const targetJob = jobEn.toLowerCase();

          const hasJob = transcript.includes(targetJob);
          // 教科が1つでも含まれていればOKとする（すべて言うのは難しいため）
          const matchedSubjs = targetSubjs.filter(s => transcript.includes(s));
          const hasSubj = matchedSubjs.length > 0;

          if (hasJob && hasSubj) {
             setSpeakFeedback("Excellent! 👏");
             speak("Excellent!");
             setTimeout(() => { setStep('QUIZ_INTRO'); setFailCount(0); }, 2000);
          } else if (transcript.length > 15 && (hasJob || hasSubj)) {

             setFailCount(prev => prev + 1);
             setSpeakFeedback(`おしい！もういちどチャレンジ！\n(聞こえた言葉: ${transcript})`);
          }
        };
        recognition.onerror = () => {
          setIsListening(false);
          setFailCount(prev => prev + 1);
          setSpeakFeedback("声がうまく聞き取れなかったよ。もういちどおしてね。");
        };
        recognition.onend = () => setIsListening(false);
        recognition.start();
      };

      const initQuiz = (index) => {
        setQuizIndex(index);

        } else {
          setQuizFeedback('wrong');
        }

      const startQuizListening = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

          break;

        case 'QUIZ':
          const currentQuiz = QUIZ_DATA[quizIndex];
          content = (
            <div className="min-h-screen bg-purple-50 p-4 pt-20 flex flex-col items-center justify-center animate-fade-in relative">
              <div className="absolute top-20 right-4 flex flex-col gap-2 items-end z-10">
                <div className="bg-white px-4 py-2 rounded-full shadow-sm border-2 border-purple-200 font-bold text-purple-700">
                  {quizIndex + 1} / {QUIZ_DATA.length} 問
                </div>
                <button onClick={() => setStep('REWARD_HOME')} className="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full shadow-md font-bold text-sm border-2 border-yellow-200 hover:bg-yellow-500 transition">
                  🎁 ごほうび画面へ
                </button>
              </div>
              <div className="bg-white w-full rounded-3xl p-8 shadow-xl border-4 border-purple-300 text-center mt-8">
                <p className="text-gray-500 font-bold mb-2">ヒント</p>
                <h2 className="text-3xl font-extrabold text-gray-800 mb-6 bg-purple-100 inline-block px-4 py-2 rounded-xl">{currentQuiz.hint}</h2>
                
                {quizPhase === 'INPUT' ? (
                  <>
                    <div className="flex flex-wrap justify-center gap-2 mb-8">
                      {quizLetters.map((l, idx) => (
                        <span key={idx} className="w-10 h-10 bg-gray-100 border-2 border-gray-300 rounded-lg flex items-center justify-center text-xl font-bold text-gray-700 uppercase shadow-sm">{l}</span>
                      ))}
                    </div>

                    <input 
                      type="text" 
                      value={quizInput}
                      onChange={(e) => { setQuizInput(e.target.value); setQuizFeedback(null); }}
                      placeholder="英単語を入力"
                      className="w-full text-center text-2xl font-mono font-bold border-b-4 border-purple-300 px-2 py-3 mb-6 focus:outline-none focus:border-purple-600 bg-gray-50 rounded-t-lg"
                      autoCapitalize="none"
                      autoCorrect="off"
                    />

                    <button onClick={checkQuiz} className="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 rounded-full shadow-lg text-xl mb-4 transition transform active:scale-95">こたえる！</button>

                    {quizFeedback === 'correct' && (
                      <div className="bg-green-100 text-green-700 p-3 rounded-xl font-bold text-lg border-2 border-green-300 animate-fade-in">
                        ⭕ 大正解！つぎは発音だ！
                      </div>
                    )}
                    {quizFeedback === 'wrong' && (
                      <div className="bg-red-100 text-red-700 p-3 rounded-xl font-bold border-2 border-red-300 animate-fade-in">
                        ❌ おしい！スペルを確認してね。
                      </div>
                    )}
                  </>
                ) : (
                  <div className="animate-fade-in">
                    <p className="text-xl font-extrabold text-purple-700 mb-4">{currentQuiz.answer}</p>
                    <button onClick={() => speak(currentQuiz.answer)} className="mb-6 bg-white text-purple-600 font-bold py-2 px-6 rounded-full border-2 border-purple-200 shadow hover:bg-purple-50 inline-flex items-center gap-2">
                      🔊 発音をきく
                    </button>
                    <div className="mb-6">
                      <button onClick={startQuizListening} disabled={isListening} className={`p-6 rounded-full shadow-lg ${isListening ? 'bg-red-500 animate-pulse' : 'bg-blue-500 hover:bg-blue-600'} text-white mx-auto text-4xl transition transform active:scale-95`}>🎤</button>
                      <p className="mt-4 text-gray-600 font-bold">{isListening ? "はなしてください..." : "マイクをおして 発音しよう"}</p>
                    </div>
                    {quizSpeakFeedback && (
                      <div className={`text-sm md:text-base font-bold p-4 rounded-xl border-2 text-left shadow-sm whitespace-pre-line ${quizSpeakFeedback.includes('Excellent') ? 'bg-green-50 text-green-700 border-green-300' : 'bg-red-50 text-red-700 border-red-300'}`}>
                        {quizSpeakFeedback}
                      </div>
                    )}
                    {failCount >= 3 && (
                      <button onClick={handleQuizNext} className="mt-4 bg-gray-200 hover:bg-gray-300 py-2 px-6 rounded-full font-bold text-gray-600 text-sm shadow">⏭️ スキップ</button>
                    )}
                  </div>
                )}
              </div>
              {quizPhase === 'INPUT' && (
                <button onClick={() => speak(currentQuiz.answer)} className="mt-8 bg-white text-purple-600 font-bold py-2 px-6 rounded-full border-2 border-purple-200 shadow hover:bg-purple-50 flex items-center gap-2">
                  🔊 答えをこっそり聞く
                </button>
              )}
            </div>
          );
          break;

        case 'REWARD_HOME':
          content = (
            <div className="min-h-screen bg-blue-50 p-4 pt-20 pb-20 flex flex-col relative animate-fade-in">
              {cookEffect && (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-[70] p-4">
                  <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
                    {cookEffect === 'cooking' ? (
                      <div className="animate-pulse">
                        <div className="text-8xl mb-4">🍲</div>
                        <p className="text-2xl font-bold text-orange-600">おなべで<br/>おりょうり中...</p>
                      </div>
                    ) : (
                      <div className="animate-fade-in-up">
                        <div className="text-8xl mb-4">✨🍽️✨</div>
                        <p className="text-gray-500 font-bold mb-2 text-lg">かんせい！</p>
                        <p className="text-2xl font-bold text-orange-700 mb-8 border-b-2 border-orange-200 pb-4">{cookEffect}</p>
                        <button onClick={() => setCookEffect(null)} className="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-full text-xl shadow-lg transform transition hover:scale-105">おいしそう！</button>
                      </div>
                    )}
                  </div>
                </div>
              )}
              {purchaseEffect && (
                <div className="fixed inset-0 pointer-events-none flex items-center justify-center z-[70]">
                  <div className="animate-bounce-in text-9xl drop-shadow-2xl">
                    {purchaseEffect === 'takenoko' ? '🎋' : '🍠'}
                  </div>
                </div>
              )}

              <div className="absolute top-20 right-4 bg-yellow-400 text-yellow-900 font-bold px-4 py-2 rounded-xl border-2 border-yellow-200 shadow-md flex flex-col items-end gap-2 text-sm z-10">
                <div className="flex gap-3"><span>🪙 {totalCoins}</span><span>🎋 {items.takenoko}</span><span>🍠 {items.satsumaimo}</span></div>
              </div>

              <div className="bg-gradient-to-r from-blue-400 to-indigo-500 p-6 rounded-3xl text-center text-white mb-6 mt-12 shadow-lg">
                <h1 className="text-2xl font-extrabold mb-2">ごほうび タイム！</h1>
                <p className="font-bold text-sm">クイズ3問クリアのごほうび！<br/>ゲームかガチャを 1回 あそべるよ🎁</p>
              </div>

              <div className="bg-white rounded-3xl shadow-md p-6 border-2 border-blue-200 mb-6">
                {rewardTickets < 1 && (
                  <div className="bg-red-100 text-red-700 p-3 rounded-xl border-2 border-red-300 text-sm font-bold mb-4 text-center animate-pulse shadow-sm">
                    ⚠️ 1回あそんだから、もうおせないよ！<br/>クイズを3問クリアして またあそぼう！
                  </div>
                )}
                
                <button onClick={startMiniGame} disabled={rewardTickets < 1} className={`w-full font-bold py-4 rounded-full shadow-md text-xl mb-4 transform transition flex items-center justify-center gap-2 ${rewardTickets >= 1 ? 'bg-red-500 hover:bg-red-600 text-white hover:scale-105' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>
                  <span>🎮</span> コインあつめ ゲーム
                </button>
                <button onClick={startGacha} disabled={rewardTickets < 1} className={`w-full font-bold py-4 rounded-full shadow-md text-xl mb-6 transform transition flex items-center justify-center gap-2 ${rewardTickets >= 1 ? 'bg-yellow-400 hover:bg-yellow-500 text-yellow-900 hover:scale-105' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>
                  <span>🎁</span> モンスター ガチャ
                </button>

                <div className="grid grid-cols-2 gap-3 mb-6">
                  <div className="bg-green-50 p-3 rounded-2xl border-2 border-green-200 text-center">
                    <h3 className="font-bold text-green-700 mb-2 text-sm">🎋 タケノコ (10🪙)</h3>
                    <button onClick={() => buyItem('takenoko', 10)} className="bg-green-500 text-white px-4 py-2 rounded-full font-bold shadow text-sm active:scale-95">かう！</button>
                  </div>
                  <div className="bg-purple-50 p-3 rounded-2xl border-2 border-purple-200 text-center">
                    <h3 className="font-bold text-purple-700 mb-2 text-sm">🍠 さつまいも (10🪙)</h3>
                    <button onClick={() => buyItem('satsumaimo', 10)} className="bg-purple-500 text-white px-4 py-2 rounded-full font-bold shadow text-sm active:scale-95">かう！</button>
                  </div>
                </div>

                <div className="bg-orange-50 p-4 rounded-2xl border-2 border-orange-200 mb-6 text-center">
                  <h3 className="font-bold text-orange-800 mb-2">👨‍🍳 おみせで お料理</h3>
                  <button 
                    onClick={cookDish} 
                    disabled={items.takenoko < 1 || items.satsumaimo < 1}
                    className={`text-white px-6 py-3 rounded-full font-bold shadow flex items-center justify-center mx-auto transition ${items.takenoko >= 1 && items.satsumaimo >= 1 ? 'bg-orange-500 hover:bg-orange-600' : 'bg-gray-400 opacity-70'}`}
                  >
                    <span className="mr-2">🍳</span>おりょうりする！
                  </button>
                </div>

                <div className="bg-yellow-50 rounded-2xl p-4 border-2 border-yellow-200">
                  <h2 className="font-bold text-yellow-700 mb-3 text-sm">⭐ あつめたモンスター ({collections.length}/30)</h2>
                  <div className="grid grid-cols-5 gap-2">
                    {collections.map(m => (
                      <div key={m.id} className={`${m.color} p-2 rounded-xl text-center shadow-sm text-xl`} title={m.name}>{m.emoji}</div>
                    ))}
                    {Array.from({ length: 30 - collections.length }).map((_, i) => (
                      <div key={`empty-${i}`} className="bg-gray-100 p-2 rounded-xl text-center border-2 border-dashed border-gray-300 text-xl opacity-50">❓</div>
                    ))}
                  </div>
                </div>
              </div>

              <button onClick={() => setStep('QUIZ')} className="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-4 rounded-full shadow-lg text-xl transform transition hover:scale-105 flex items-center justify-center gap-2">
                <span>✨</span> クイズに もどる <span>✨</span>
              </button>
            </div>
          );
          break;

        case 'MINIGAME_INTRO':
          content = (
            <div className="min-h-screen bg-green-50 p-4 pt-20 flex items-center justify-center">
              <div className="w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-green-200">
                <h2 className="text-2xl font-bold text-green-600 mb-6">コインあつめ ゲーム！</h2>
                <div className="bg-green-100 p-6 rounded-2xl mb-8">
                  <div className="text-6xl mb-4">🪙🏃‍♂️</div>
                  <p className="text-base font-bold text-gray-700 leading-relaxed text-left">
                    ボタンを おして<br/>モンスターを うごかそう！<br/><br/>
                    せいげんじかん(15びょう)内に、<br/>コイン（🪙）を あつめてね！
                  </p>
                </div>
                <button onClick={() => setStep('MINIGAME')} className="bg-green-500 text-white font-bold py-4 rounded-full text-xl shadow-md w-full active:scale-95">スタート！</button>
              </div>
            </div>
          );
          break;

        case 'MINIGAME':
          const gameMonsters = collections.length > 0 ? collections : [];
          content = <MiniGame monsters={gameMonsters} onFinish={(coins) => {
            setLastEarnedCoins(coins);
            const newTotal = totalCoins + coins;
            saveGameData(newTotal, items, collections, cookedDishes, rewardTickets);
            setStep('MINIGAME_RESULT');
          }} />;
          break;

        case 'MINIGAME_RESULT':
          content = (
            <div className="min-h-screen bg-yellow-50 p-4 pt-20 flex items-center justify-center">
              <div className="w-full bg-white rounded-3xl shadow-xl p-8 border-4 border-yellow-200 text-center animate-fade-in-up">
                <h2 className="text-2xl font-bold text-yellow-600 mb-6">ゲーム おつかれさま！</h2>
                <div className="text-6xl mb-6">🎉</div>
                <p className="text-xl font-bold text-gray-700 mb-4">あつめたコイン: <span className="text-yellow-500 text-3xl">{lastEarnedCoins}</span></p>
                <p className="font-bold text-gray-500 mb-8">ぜんぶで {totalCoins} コインになったよ！</p>
                <button onClick={() => setStep('REWARD_HOME')} className="bg-blue-500 text-white font-bold py-4 rounded-full w-full shadow-md active:scale-95">ごほうび画面にもどる</button>
              </div>
            </div>
          );
          break;

        case 'GACHA':
          content = (
            <div className="min-h-screen bg-indigo-900 p-4 pt-20 flex items-center justify-center relative overflow-hidden">
              <div className="absolute inset-0 opacity-50 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-700 via-indigo-900 to-black"></div>
              <div className="w-full bg-white/10 backdrop-blur-md rounded-3xl shadow-2xl p-8 text-center relative z-10 border border-white/20">
                <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 mb-8">モンスター ガチャ！</h2>
                {!currentGachaMonster ? (
                  <div className="mb-8">
                    {isRolling ? (
                      <div className="flex flex-col items-center justify-center">
                        <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-8 border-4 border-yellow-300 shadow-[0_0_50px_rgba(253,224,71,0.6)]">
                          <span className="text-6xl">{rollEmoji}</span>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div className="w-32 h-32 mx-auto bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center animate-bounce mb-8 shadow-[0_0_30px_rgba(236,72,153,0.5)]">
                          <span className="text-5xl">🎁</span>
                        </div>
                        <button onClick={rollGacha} className="bg-gradient-to-r from-yellow-400 to-orange-500 text-white text-xl font-black py-4 px-8 rounded-full border-4 border-yellow-200 shadow-2xl active:scale-95 w-full">ガチャを まわす！</button>
                      </>
                    )}
                  </div>
                ) : (
                  <div className="mb-4 animate-fade-in-up">
                    <p className="text-yellow-300 font-bold text-lg mb-4">ゲットした モンスターは…</p>
                    <div className={`${currentGachaMonster.color} w-40 h-40 mx-auto rounded-full flex items-center justify-center mb-6 border-4 border-white shadow-[0_0_40px_rgba(255,255,255,0.3)]`}>
                      <span className="text-6xl">{currentGachaMonster.emoji}</span>
                    </div>
                    <h3 className="text-2xl font-extrabold text-white mb-8">{currentGachaMonster.name}</h3>
                    <button onClick={() => { setCurrentGachaMonster(null); setStep('REWARD_HOME'); }} className="bg-yellow-500 text-white font-bold py-4 rounded-full shadow-lg w-full active:scale-95">もどる</button>
                  </div>
                )}
              </div>
            </div>
          );
          break;

        case 'FINISH':
          content = (
            <div className="min-h-screen bg-yellow-100 p-4 pt-20 flex flex-col items-center justify-center animate-fade-in text-center">
              <div className="text-8xl mb-6">🎊</div>
              <h1 className="text-4xl font-black text-yellow-600 mb-4 drop-shadow-md">全問クリア！</h1>
              <p className="text-xl font-bold text-gray-700 mb-8 leading-relaxed">50問のクイズを<br/>すべてクリアしたよ！<br/>キミはえいごマスターだ！</p>
              <button onClick={() => window.location.reload()} className="bg-yellow-500 text-white font-bold py-4 px-12 rounded-full shadow-lg text-2xl hover:bg-yellow-600 transition">さいしょから</button>
            </div>
          );
          break;
      }

      return (
        <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative overflow-hidden text-gray-800">
          {!['START', 'FINISH'].includes(step) && (
            <div className="absolute top-4 left-4 z-50">
              <button 
                onClick={handleBack} 
                className="bg-white/90 backdrop-blur-sm text-gray-600 border-2 border-gray-200 px-4 py-2 rounded-full font-bold shadow flex items-center gap-1 hover:bg-gray-50 active:scale-95"
              >
                <span className="text-xl">◀</span> もどる
              </button>
            </div>
          )}

          {!['START', 'FINISH'].includes(step) && (
            <button 
              onClick={() => setShowWorksheet(true)} 
              className="fixed bottom-6 right-6 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 p-4 rounded-full shadow-2xl z-40 text-3xl border-4 border-white transition transform hover:scale-110"
            >
              📑<span className="text-xs font-bold block -mt-1 text-center">ワークシート</span>
            </button>
          )}

          {showWorksheet && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[60] p-4 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-3xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto relative border-4 border-yellow-300 shadow-2xl">
                <button onClick={() => setShowWorksheet(false)} className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-3xl font-bold bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center shadow z-10 border-2 border-gray-300">✖</button>
                <h3 className="text-2xl font-bold text-yellow-700 mb-6 flex items-center border-b-2 border-yellow-200 pb-2"><span className="mr-2 text-3xl">📑</span> ワークシートかくにん</h3>
                
                <div className="mb-6 bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
                  <h4 className="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-1">つきたい職業</h4>
                  <p className="text-lg font-bold text-gray-800">{jobJa || "（未入力）"}</p>
                  <p className="text-xl font-bold text-blue-600">{jobEn}</p>
                </div>

                <div className="bg-green-50 p-4 rounded-xl border-2 border-green-200">
                  <h4 className="font-bold text-green-800 mb-2 border-b border-green-200 pb-1">時間割</h4>
                  <ul className="space-y-2">
                    {timetable.map((t, i) => (
                      <li key={i} className="flex justify-between items-center bg-white p-2 rounded-lg border border-green-100 shadow-sm">
                        <span className="font-bold text-gray-500 w-6 text-center">{i+1}</span>
                        <span className="font-bold text-gray-800 flex-1 ml-2">{t ? t.ja : '（未入力）'}</span>
                        <span className="font-bold text-green-600 text-sm">{t ? t.en : ''}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          )}

          {content}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
